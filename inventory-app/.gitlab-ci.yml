stages:
  - test
  - build
  - deploy

variables:
  AWS_REGISTRY_URL: "327425719370.dkr.ecr.eu-north-1.amazonaws.com"
  APP_NAME: "inventory-app"
  CLUSTER_NAME: "microservices-cluster"
  SERVICE_NAME: "inventory-app-service"

# Executes your unit tests locally inside the GitLab runner container
run_all_tests:
  stage: test
  image: python:3.12-slim
  services:
    - name: postgres:15-alpine
      alias: inventory-db
  variables:
    DB_USER: "test_user"
    DB_PASSWORD: "test_password"
    DB_HOST: "inventory-db"
    DB_PORT: "5432"
    DB_NAME: "inventory_test"
    POSTGRES_DB: "inventory_test"
    POSTGRES_PASSWORD: "test_password"
    POSTGRES_USER: "test_user"
  script:
    - pip install -r requirements.txt
    # 1. Run Unit Tests first
    - pytest tests/unit/
    # 2. Run Integration Tests second (overriding host for the GitLab service container network)
    - DB_HOST=inventory-db pytest tests/integration/
# This stage builds the Docker image and pushes it securely to AWS ECR
build_image:
  stage: build
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: "" # Disables TLS requirement between client and service
  before_script:
    # Install AWS CLI inside the runner container to authenticate with ECR
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_REGISTRY_URL
  script:
    # Build the image using the unique GitLab Commit SHA tag
    - docker build -t $AWS_REGISTRY_URL/$APP_NAME:$CI_COMMIT_SHA .
    # Also tag it as latest for reference
    - docker tag $AWS_REGISTRY_URL/$APP_NAME:$CI_COMMIT_SHA $AWS_REGISTRY_URL/$APP_NAME:latest
    # Push both tags to ECR
    - docker push $AWS_REGISTRY_URL/$APP_NAME:$CI_COMMIT_SHA
    - docker push $AWS_REGISTRY_URL/$APP_NAME:latest

# This stage triggers AWS ECS to download the new image and restart the Fargate task
deploy_to_ecs:
  stage: deploy
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  script:
    # Update the ECS Task Definition to use the new container image tag
    - aws ecs update-service --cluster $CLUSTER_NAME --service $SERVICE_NAME --force-new-deployment --region $AWS_DEFAULT_REGION
  only:
    - main # Only deploy when code is merged into the main branch
