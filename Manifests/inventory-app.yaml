apiVersion: v1
kind: Service
metadata:
  name: inventory-app
spec:
  ports:
    - port: 8080
  selector:
    app: inventory-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-app
  template:
    metadata:
      labels:
        app: inventory-app
    spec:
      containers:
        - name: inventory-app
          image: borsok/inventory-app:v1
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m" # Required for HPA
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: DB_HOST
              value: "inventory-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "movies_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: crud-secrets
                  key: INVENTORY_DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crud-secrets
                  key: INVENTORY_DB_PASSWORD
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inventory-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inventory-app
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
