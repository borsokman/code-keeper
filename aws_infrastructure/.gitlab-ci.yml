stages:
  - validate
  - plan
  - infra-deploy # New infrastructure provisioning stage
  - app-deploy # For updating ECS task definitions
  - e2e-test
  - apply

.terraform_base:
  image:
    name: hashicorp/terraform:1.7
    entrypoint: [""]
  before_script:
    # Ensure AWS Credentials are ready for Terraform
    - export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
    - export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
    - export AWS_DEFAULT_REGION="eu-north-1"
    # Pass database and message broker passwords securely using TF_VAR_ environment variables
    - export TF_VAR_rabbitmq_password=$RABBITMQ_PASSWORD
    - export TF_VAR_db_password_inventory=$DB_PASSWORD_INVENTORY
    - export TF_VAR_db_password_billing=$DB_PASSWORD_BILLING

# Cache the .terraform directory so it doesn't download AWS providers on every stage
cache:
  key: terraform-cache
  paths:
    - .aws_infrastructure/

before_script:
  - terraform init

# Stage 1: Ensure syntax and formatting are flawless
validate_infrastructure:
  stage: validate
  script:
    - terraform fmt -check
    - terraform validate

# Stage 2: Create the execution plan and save it as an artifact
plan_infrastructure:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    name: "tfplan"
    paths:
      - tfplan
    expire_in: 1 hour

infra_deploy_staging:
  extends: .terraform_base
  stage: infra-deploy
  script:
    - cd terraform/environments/staging
    - terraform init
    - terraform validate
    - terraform apply -auto-approve
  only:
    - main

infra_deploy_production:
  extends: .terraform_base
  stage: infra-deploy
  script:
    - cd terraform/environments/production
    - terraform init
    - terraform validate
    - terraform apply -auto-approve
  only:
    - main
  when: manual
